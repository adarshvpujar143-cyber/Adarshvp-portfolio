  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html { scroll-behavior: smooth; font-family: 'Plus Jakarta Sans', sans-serif; }
    
    /* Smooth, cinematic multi-axis page element handling */
    .section-view-transition {
      transition: all 0.9s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    
    /* Global scrollbar suppression rules */

<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Your original 6 variable theme profiles translated into Tailwind engine classes
    const INTUITIVE_PALETTES = [
      { id: "theme-1", bg: "bg-[#091D1B]", card: "bg-[#1B5450]/20", border: "border-[#386E6B]/40", text: "text-white", muted: "text-[#B3C5BD]", accent: "bg-[#386E6B]", hover: "hover:bg-[#1B5450]" },
      { id: "theme-2", bg: "bg-[#F1F2F6]", card: "bg-white", border: "border-[#D1CDDA]", text: "text-[#4A3B63]", muted: "text-[#9A8CB3]", accent: "bg-[#C3B1E1]", hover: "hover:bg-[#4A3B63]" },
      { id: "theme-3", bg: "bg-[#050F2A]", card: "bg-[#7BBBFF]/10", border: "border-[#B8A9FF]/30", text: "text-[#F2FDFF]", muted: "text-[#7BBBFF]", accent: "bg-[#B8A9FF]", hover: "hover:bg-[#7BBBFF]" },
      { id: "theme-4", bg: "bg-[#d5faf9]", card: "bg-[#c1f0e2]", border: "border-[#96d2c2]", text: "text-[#26658C]", muted: "text-[#6dd0b7]", accent: "bg-[#4fc7a7]", hover: "hover:bg-[#7fe3d7]" },
      { id: "theme-5", bg: "bg-[#013137]", card: "bg-[#215E68]/25", border: "border-[#5C9396]/50", text: "text-[#C1D9DE]", muted: "text-[#5C9396]", accent: "bg-[#297376]", hover: "hover:bg-[#215E68]" },
      { id: "theme-6", bg: "bg-[#011C40]", card: "bg-[#26658C]/15", border: "border-[#54ACBF]/40", text: "text-[#A7EBF2]", muted: "text-[#54ACBF]", accent: "bg-[#26658C]", hover: "hover:bg-[#023859]" }
    ];

    function App() {
      const [themeIndex, setThemeIndex] = useState(() => {
        const saved = localStorage.getItem("activePortfolioTheme");
        const idx = INTUITIVE_PALETTES.findIndex(t => t.id === saved);
        return idx !== -1 ? idx : 0;
      });
      
      const theme = INTUITIVE_PALETTES[themeIndex];
      const [headlineText, setHeadlineText] = useState("Full Stack Developer");
      const [openProject, setOpenProject] = useState(null);
      const [qrVisible, setQrVisible] = useState(false);
      const [searchQuery, setSearchQuery] = useState("");
      const [isNavVisible, setIsNavVisible] = useState(true);
      const [chatOpen, setChatOpen] = useState(false);
      const [chatInput, setChatInput] = useState("");
      const [chatLogs, setChatLogs] = useState([
        { sender: 'bot', text: "Hello! I am Adarsh's custom portfolio assistant. What help do you want regarding this portfolio? Ask me about my skills, projects, education, or contact data links!" }
      ]);

      const lastScrollY = useRef(0);
      const sectionRefs = {
        home: useRef(null),
        about: useRef(null),
        skills: useRef(null),
        education: useRef(null),
        projects: useRef(null),
        experience: useRef(null),
        certifications: useRef(null),
        contact: useRef(null)
      };

      // Centers the clicked tab target into pristine focus smoothly
      const snapToSection = (id) => {
        sectionRefs[id]?.current?.scrollIntoView({
          behavior: 'smooth',
          block: 'center'
        });
      };

      // Hidden layout rotation theme trigger mechanics
      const cycleGlobalTheme = () => {
        const nextIdx = (themeIndex + 1) % INTUITIVE_PALETTES.length;
        setThemeIndex(nextIdx);
        localStorage.setItem("activePortfolioTheme", INTUITIVE_PALETTES[nextIdx].id);
      };

      // Dual-Axis intersection engine: controls fade-out on scroll down and fade-in on scroll up
      useEffect(() => {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('opacity-100', 'translate-x-0', 'scale-100');
              entry.target.classList.remove('opacity-0', 'translate-x-16', '-translate-x-16', 'scale-95');
            } else {
              entry.target.classList.add('opacity-0', 'scale-95');
              if (entry.boundingClientRect.top < 0) {
                entry.target.classList.add('-translate-x-16'); // slide left when leaving down
                entry.target.classList.remove('translate-x-16');
              } else {
                entry.target.classList.add('translate-x-16');  // slide right when leaving up
                entry.target.classList.remove('-translate-x-16');
              }
            }
          });
        }, { threshold: 0.1 });

        Object.values(sectionRefs).forEach(ref => {
          if (ref.current) observer.observe(ref.current);
        });

        // Sticky navigation track visibility logic
        const handleScroll = () => {
          const currentY = window.pageYOffset;
          if (currentY < 30) setIsNavVisible(true);
          else setIsNavVisible(lastScrollY.current > currentY);
          lastScrollY.current = currentY;
        };

        window.addEventListener("scroll", handleScroll);
        return () => {
          observer.disconnect();
          window.removeEventListener("scroll", handleScroll);
        };
      }, [themeIndex]);

      // Sub-Headline carousel text loop
      useEffect(() => {
        const titles = ["Full Stack Developer", "Data Analyst", "Azure AI Certified", "Software Engineer"];
        let currentIdx = 0;
        const interval = setInterval(() => {
          currentIdx = (currentIdx + 1) % titles.length;
          setHeadlineText(titles[currentIdx]);
        }, 3000);
        return () => clearInterval(interval);
      }, []);

      // Navigation search parsing logic
      const handleSearchSubmit = (e) => {
        if (e.key === "Enter") {
          const query = searchQuery.toLowerCase().trim();
          if (!query) return;
          for (const [id, ref] of Object.entries(sectionRefs)) {
            if (ref.current?.textContent.toLowerCase().includes(query)) {
              ref.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
              ref.current.style.outline = "2px dashed currentColor";
              setTimeout(() => { if(ref.current) ref.current.style.outline = "none"; }, 1500);
              break;
            }
          }
        }
      };

      // NLP chatbot internal framework routing
      const processBotReply = () => {
        const text = chatInput.trim();
        if (!text) return;
        const updatedLogs = [...chatLogs, { sender: 'user', text }];
        setChatLogs(updatedLogs);
        setChatInput("");

        setTimeout(() => {
          const lower = text.toLowerCase();
          let reply = "ℹ️ I can only process direct inquiries regarding Adarsh's specific Skills, Projects, Education background, Experience timelines, Certifications, or Social App Accounts. Please check your spelling!";
          
          if (/education|college|school|nie|nieit|mysore|cgpa|grade|vvs/.test(lower)) {
            reply = "🎓 <strong>Education Records:</strong><br><br>• <strong>B.E. Information Science & Engineering:</strong> NIE Institute of Technology, Mysore. Completed with a verified <strong>8.3 CGPA</strong> rating track.<br>• <strong>School Foundations:</strong> VVS Educational Institution.";
          } else if (/contact|phone|call|whatsapp|instagram|linkedin|number|reach|social/.test(lower)) {
            reply = "📬 <strong>Adarsh's Application Routing Buttons:</strong><br><br>• <strong>WhatsApp Link:</strong> Native connection to reach +91 9886103154.<br>• <strong>LinkedIn / Instagram:</strong> Re-routed inside application brand icons fixed at the bottom grid wrapper.";
          } else if (/project|projects|deaf|communication|car rental|database/.test(lower)) {
            reply = "🚀 <strong>Project Architecture Specs:</strong><br><br>• <strong>Deaf Communication Matrix:</strong> 95% classification performance built using Python, OpenCV, and MediaPipe.<br>• <strong>Car Rental Management:</strong> Normalization models deployed on relational MySQL architectures.";
          } else if (/skill|skills|technologies|react|python|sql/.test(lower)) {
            reply = "🛠️ <strong>Technical Framework Stack:</strong><br>React.js, Node.js, Express.js, JavaScript, Python, FastAPI, Flask, OpenCV, SQL, MySQL, MongoDB, and Azure cloud computing nodes.";
          } else if (/experience|job|intern|chromosis|hpe|work/.test(lower)) {
            reply = "💼 <strong>Experience Milestones:</strong><br><br>• <strong>Full Stack Apprentice:</strong> Chromosis Technologies (Dec 2025 - Present).<br>• <strong>Frontend Intern:</strong> Hewlett Packard Enterprise (4 Months). Core React engineering cycles.<br>• <strong>Marketing Execution:</strong> PhoneMax Operations.";
          } else if (/certification|azure|ai-900|fundamentals/.test(lower)) {
            reply = "📜 <strong>Cloud Credentials:</strong><br>Adarsh holds the <strong>Microsoft Certified: Azure AI Fundamentals (AI-900)</strong> credential, validating cognitive API orchestration.";
          }

          setChatLogs(prev => [...prev, { sender: 'bot', text: reply }]);
          const area = document.getElementById("chat-logs-area");
          if (area) setTimeout(() => area.scrollTop = area.scrollHeight, 50);
        }, 400);
      };

      return (
        <div className={`min-h-screen ${theme.bg} ${theme.text} transition-colors duration-500 pb-20 font-sans overflow-x-hidden pt-24 px-4 flex flex-col items-center`}>
          
          {/* TOP INTEGRATED NAVIGATION HUB */}
          <nav className={`fixed top-0 left-0 w-full h-14 ${theme.card} backdrop-blur-xl border-b ${theme.border} z-50 flex items-center justify-between px-4 transition-transform duration-300 ${isNavVisible ? 'translate-y-0' : '-translate-y-full'}`}>
            <div className="flex items-center gap-3 overflow-x-auto no-scrollbar max-w-[70%]">
              <button onClick={() => snapToSection('home')} className="text-lg flex-shrink-0 transform active:scale-90 transition-transform">🏠</button>
              <button onClick={() => snapToSection('about')} className="text-lg flex-shrink-0 transform active:scale-90 transition-transform">🧑‍💻</button>
              <button onClick={() => snapToSection('skills')} className="text-lg flex-shrink-0 transform active:scale-90 transition-transform">🛠️</button>
              <button onClick={() => snapToSection('education')} className="text-lg flex-shrink-0 transform active:scale-90 transition-transform">🎓</button>
              <button onClick={() => snapToSection('projects')} className="text-lg flex-shrink-0 transform active:scale-90 transition-transform">🚀</button>
              <button onClick={() => snapToSection('experience')} className="text-lg flex-shrink-0 transform active:scale-90 transition-transform">💼</button>
              <button onClick={() => snapToSection('certifications')} className="text-lg flex-shrink-0 transform active:scale-90 transition-transform">📜</button>
              <button onClick={() => snapToSection('contact')} className="text-lg flex-shrink-0 transform active:scale-90 transition-transform">📬</button>
              <button onClick={cycleGlobalTheme} className="text-lg flex-shrink-0 transform active:scale-75 transition-transform">🎨</button>
            </div>
            <div className="flex items-center">
              <input 
                type="text" 
                placeholder="Search..." 
                value={searchQuery}
                onChange={(e) => setSearchQuery(e.target.value)}
                onKeyPress={handleSearchSubmit}
                className={`bg-black/20 border ${theme.border} ${theme.text} text-xs rounded-full px-3 py-1 outline-none w-28 focus:w-36 transition-all duration-300`}
              />

          </nav>

          {/* MASTER CENTRALIZED WORKSPACE */}

            {/* HERO BLOCK WITH FLUID ENHANCEMENTS */}

                <img src="profile.jpg" alt="Adarsh V Pujar" className="w-full h-full object-cover" onError={(e)=>{e.target.src='avatar-gpt.png'}} />

              </p>

                  <span className="mix-blend-difference text-white">View & Download Resume</span>
                  <svg className="w-4 h-4 mix-blend-difference text-white" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4M7 10l5 5 5-5M12 15V3"/>
                  </svg>
                </a>
              </div>
            </header>

            {/* SCORE DISPLAY TILES */}
            <section className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div className={`section-view-transition p-5 rounded-2xl ${theme.card} border ${theme.border} text-center hover:scale-[1.02] transition-transform`}>
                <h3 className="text-xl font-bold mb-1">📊 8.3 CGPA</h3>
                <p className={`text-xs ${theme.muted}`}>B.E. ISE Graduate from NIEIT</p>
              </div>
              <div className={`section-view-transition p-5 rounded-2xl ${theme.card} border ${theme.border} text-center hover:scale-[1.02] transition-transform`}>
                <h3 className="text-xl font-bold mb-1">🏏 State Level</h3>
                <p className={`text-xs ${theme.muted}`}>VTU Cricket Representative</p>
              </div>
              <div className={`section-view-transition p-5 rounded-2xl ${theme.card} border ${theme.border} text-center hover:scale-[1.02] transition-transform`}>
                <h3 className="text-xl font-bold mb-1">☁️ Azure AI</h3>
                <p className={`text-xs ${theme.muted}`}>Certified Professional</p>
              </div>
            </section>

            {/* BIOGRAPHY AREA */}
            <section ref={sectionRefs.about} className={`section-view-transition p-6 md:p-8 rounded-3xl ${theme.card} border ${theme.border}`}>
              <h2 className="text-xl font-bold mb-4 flex items-center gap-2">🧑‍💻 About Me</h2>
              <p className="text-sm md:text-base leading-relaxed opacity-95">I am an Information Science and Engineering graduate from NIE Institute of Technology, Mysore (CGPA 8.3/10). I have hands-on experience in Full Stack Development, Frontend Engineering, REST API integration, Data Analytics, and Business Intelligence. My expertise includes React.js, Node.js, Python, SQL, MongoDB, MySQL, and Azure AI. I enjoy building scalable applications, solving real-world problems, and transforming complex datasets into meaningful business insights.</p>
            </section>

            {/* TECHNICAL STACK HOUSING */}
            <section ref={sectionRefs.skills} className={`section-view-transition p-6 md:p-8 rounded-3xl ${theme.card} border ${theme.border}`}>
              <h2 className="text-xl font-bold mb-4 flex items-center gap-2">🛠️ Technical Skills</h2>
              <div className="flex flex-wrap gap-2">
                {["React.js", "Node.js", "Express.js", "Python", "JavaScript ES6+", "SQL", "MySQL", "MongoDB", "REST APIs", "Flask", "FastAPI", "OpenCV", "HTML5", "CSS3", "Bootstrap", "Angular", "Git", "GitHub", "Power BI", "Azure AI"].map(skill => (
                  <span key={skill} className={`text-xs font-semibold px-4 py-2 rounded-full bg-black/20 border ${theme.border} hover:scale-105 transition-transform cursor-default`}>{skill}</span>
                ))}

            {/* EDUCATION CHANNELS */}
            <section ref={sectionRefs.education} className={`section-view-transition p-6 md:p-8 rounded-3xl ${theme.card} border ${theme.border}`}>
              <h2 className="text-xl font-bold mb-6 flex items-center gap-2">🎓 Education Details</h2>
              <div className="flex flex-col gap-6">
                <div className={`p-5 rounded-2xl bg-black/10 border ${theme.border} flex flex-col gap-4 transform hover:rotate-[-0.5deg] transition-transform`}>
                  <div className="w-full h-48 md:h-64 rounded-xl overflow-hidden bg-black">
                    <img src="nieit.jpg" alt="NIEIT View" className="w-full h-full object-cover" />

                <div className={`p-5 rounded-2xl bg-black/10 border ${theme.border} flex flex-col gap-4 transform hover:rotate-[0.5deg] transition-transform`}>
                  <div className="w-full h-48 md:h-64 rounded-xl overflow-hidden bg-black">
                    <img src="vvs.jpg" alt="VVS View" className="w-full h-full object-cover" />

                  <div>
                    <h4 className="text-base font-bold">Secondary & Higher Secondary Education</h4>
                    <h5 className={`text-xs ${theme.muted} my-1`}>VVS Educational Institution</h5>
                    <p className="text-xs opacity-90 leading-relaxed mt-2">Core academic foundations covering mathematics computational engineering vectors, analytics basics, and init 
                       </div>
                </div>
                <div className={`p-5 rounded-2xl bg-black/10 border ${theme.border} flex flex-col gap-4 transform hover:rotate-[0.5deg] transition-transform`}>
                  <div className="w-full h-48 md:h-64 rounded-xl overflow-hidden bg-black">
                    <img src="vvs.jpg" alt="VVS View" className="w-full h-full object-cover" />
                  </div>
                  <div>
                    <h4 className="text-base font-bold">Secondary & Higher Secondary Education</h4>
                    <h5 className={`text-xs ${theme.muted} my-1`}>VVS Educational Institution</h5>
                    <p className="text-xs opacity-90 leading-relaxed mt-2">Core academic foundations covering mathematics computational engineering vectors, analytics basics, and initial software foundational syntax tools.</p>

              <h2 className="text-xl font-bold px-1 flex items-center gap-2">🚀 Featured Projects</h2>
              
              {/* COMPONENT 1: DEAF COMM */}

              >
